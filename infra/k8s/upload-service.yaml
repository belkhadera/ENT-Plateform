apiVersion: apps/v1
kind: Deployment
metadata:
  name: upload-service
  namespace: ent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: upload-service
  template:
    metadata:
      labels:
        app: upload-service
    spec:
      containers:
        - name: upload-service
          image: ent/upload-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: SERVICE_NAME
              value: "upload-service"
            - name: SERVICE_PORT
              value: "8000"
            - name: KEYCLOAK_URL
              valueFrom:
                configMapKeyRef:
                  name: ent-config
                  key: KEYCLOAK_URL
            - name: KEYCLOAK_REALM
              valueFrom:
                configMapKeyRef:
                  name: ent-config
                  key: KEYCLOAK_REALM
            - name: CASSANDRA_HOST
              valueFrom:
                configMapKeyRef:
                  name: ent-config
                  key: CASSANDRA_HOST
            - name: CASSANDRA_PORT
              valueFrom:
                configMapKeyRef:
                  name: ent-config
                  key: CASSANDRA_PORT
            - name: CASSANDRA_KEYSPACE
              valueFrom:
                configMapKeyRef:
                  name: ent-config
                  key: CASSANDRA_KEYSPACE
            - name: MINIO_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: ent-config
                  key: MINIO_ENDPOINT
            - name: MINIO_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: ent-config
                  key: MINIO_BUCKET
            - name: MINIO_SECURE
              valueFrom:
                configMapKeyRef:
                  name: ent-config
                  key: MINIO_SECURE
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: ent-secrets
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: ent-secrets
                  key: MINIO_SECRET_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: upload-service
  namespace: ent
spec:
  selector:
    app: upload-service
  ports:
    - port: 8000
      targetPort: 8000
